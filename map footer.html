<html>
<head>



<style>
.map{
    width:80%;
    max-width:80%;
    margin:auto;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}
.map iframe{
    width:100%;
    height:70%;
    border:none;
}

.map{
    padding:15px 40px;
    font-size:30px;
    font-weight:bold;

    margin-top:20px;
    text-align:center;
    color:white;
    background:linear-gradient(45deg,#FF0076,#ee0979,#FF2E4C);
;
        border:none;
    border-radius:12px;
    cursor:pointer;
    
    box-shadow:
        0 8px 0 #c2185b,
        0 12px 20px rgba(0,0,0,0.3);

    transition:all 0.2s ease;
}


.footer{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    padding:20px;
    background:#122837;
    margin-top:30px;
box-shadow: 0 0 40px cyan;


}


.box{
    width:70%;
    height:30%;
    background:#333;
    color:cyan;
    text-align:center;
    padding:15px;
    border-radius:10px;
    transition:0.3s;

    border-width: 4px;
    border-style: solid;
    border-color: cyan;
    
}




.box:hover{
    transform:translateY(-6px);
    box-shadow:0 0 15px cyan;
}

.box i{
    font-size:20px;
    color:cyan;
    margin-bottom:10px;
}

.box h3{
    margin:5px 0;
}

.box p{
    margin:0;
    font-size:14px;
}

.cut-square{
  font-weight:bold;
  height:10px;
  width:95%;
    color:white;
    margin-top:30px;
    padding-left:0px;
  text-align:center;
  font-size:27;
  padding:30px;
  background:linear-gradient(
  45deg,#E21C34,#ff0000,#00ff00,#18C729,#0000ff,#ff00ff,cyan,red,yellow,blue,pink,green,black,#ff0076,#ff0076);
  background-size:300% 50%;
  animation:color 7s infinite;

    border-radius:40px 10px 40px 10px;
    
}

@keyframes color{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}






</style>
</head>
<body>

</div>

<div class="map">

</div>

    <div class="box">
        <i class="fas fa-phone"></i>

    <div class="box">
        <i class="fas fa-envelope"></i>

    </div>
</div>
