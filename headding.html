<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Heading</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f4f4f4;
    font-family:Arial, sans-serif;
}

.header{
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    padding:30px 20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.logo{
    font-size:50px;
    font-weight:900;
    color:white;
    text-transform:uppercase;
    letter-spacing:2px;
    cursor:pointer;
    transition:0.4s;
    text-shadow:
        0 3px 0 #1a4fc7,
        0 6px 10px rgba(0,0,0,0.3);
}

.logo:hover{
    transform:scale(1.08);
    letter-spacing:5px;
    color:#ffeb3b;
    text-shadow:
        0 0 10px #ffeb3b,
        0 0 20px #ffeb3b,
        0 0 40px #ffeb3b;
}
</style>

</head>
<body>

<div class="header">
    <h1 class="logo">CHHINDWARA ITI</h1>
</div>

</body>
</html>
