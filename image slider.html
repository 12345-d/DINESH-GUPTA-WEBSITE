<!DOCTYPE html>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.slider{
    width:100%;
    height:30%;
    overflow:hidden;
    position:relative;
}

.slides{
    display:flex;
    width:400%;
    animation:slide 12s infinite;
}

.slides img{
    width:100%;
    height:240px;
    object-fit:cover;
}

@keyframes slide{
    0%{margin-left:0;}
    20%{margin-left:0;}

    25%{margin-left:-100%;}
    45%{margin-left:-100%;}

    50%{margin-left:-200%;}
    70%{margin-left:-200%;}

    75%{margin-left:-300%;}
    95%{margin-left:-300%;}

    100%{margin-left:0;}
}

.text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:WHITE;
    font-weight:bold;
    text-align:center;
}

.text h1{
    font-size:50px;
}



</style>
</head>
